name: Codex PR Review

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  issues: write

concurrency:
  group: codex-pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: Review pull request with Codex
    if: ${{ !github.event.pull_request.draft && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      review: ${{ steps.codex.outputs.final-message }}
    steps:
      - name: Check required secret
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "Missing OPENAI_API_KEY GitHub secret."
            exit 1
          fi

      - name: Check out pull request head
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Fetch base branch
        shell: bash
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin "${BASE_REF}:${BASE_REF}"

      - name: Run Codex review
        id: codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          model: gpt-5.1-codex
          prompt: |
            Review this pull request like a tough but fair maintainer.

            PR title: ${{ github.event.pull_request.title }}
            PR number: #${{ github.event.pull_request.number }}
            Base branch: ${{ github.event.pull_request.base.ref }}
            Head branch: ${{ github.event.pull_request.head.ref }}

            Focus on correctness, regressions, user-visible bugs, security, maintainability, and missing tests.
            Check the diff against `origin/${{ github.event.pull_request.base.ref }}`.
            Use `AGENTS.md` as repo-specific review guidance.

            Return concise markdown with this structure:
            - one short summary paragraph
            - `High`: must-fix issues
            - `Medium`: should-fix issues
            - `Low`: optional polish

            If you do not find a real issue, say so plainly and mention what you checked.
          codex-args: |
            --full-auto

      - name: Fail if Codex returned nothing
        shell: bash
        env:
          REVIEW: ${{ steps.codex.outputs.final-message }}
        run: |
          set -euo pipefail
          if [ -z "${REVIEW}" ]; then
            echo "Codex produced an empty review."
            exit 1
          fi

  comment:
    name: Post review comment
    needs: review
    if: ${{ needs.review.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Create or update PR comment
        uses: actions/github-script@v8
        env:
          REVIEW: ${{ needs.review.outputs.review }}
          COMMENT_MARKER: <!-- codex-pr-review -->
        with:
          script: |
            const marker = process.env.COMMENT_MARKER;
            const review = (process.env.REVIEW || '').trim();
            const body = `${marker}\n## Codex review\n\n${review}`;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              comment.user?.login === 'github-actions[bot]' && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
