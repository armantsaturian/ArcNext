<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quit</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        height: 100%;
        overflow: hidden;
        background: transparent;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        color: #fff;
        -webkit-user-select: none;
        user-select: none;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .dialog {
        width: 100%;
        padding: 24px 24px 28px;
        text-align: center;
        -webkit-app-region: drag;
      }
      .icon {
        width: 56px;
        height: 56px;
        margin: 0 auto 14px;
        border-radius: 14px;
        object-fit: contain;
      }
      .title {
        font-size: 15px;
        font-weight: 600;
        margin-bottom: 4px;
        letter-spacing: -0.2px;
      }
      .detail {
        font-size: 12px;
        color: rgba(255,255,255,0.65);
        margin-bottom: 20px;
      }
      .buttons {
        display: flex;
        gap: 8px;
        -webkit-app-region: no-drag;
      }
      button {
        flex: 1;
        height: 34px;
        border: 2px solid transparent;
        border-radius: 8px;
        background: rgba(255,255,255,0.1);
        color: #fff;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        outline: none;
        transition: background 0.15s, border-color 0.15s;
      }
      button:hover {
        background: rgba(255,255,255,0.15);
      }
      button:focus-visible {
        border-color: #a878d4;
      }
      .kbd {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 20px;
        height: 20px;
        padding: 0 5px;
        margin-left: 6px;
        border-radius: 4px;
        background: rgba(255,255,255,0.12);
        font-size: 10px;
        font-weight: 600;
        line-height: 1;
        color: rgba(255,255,255,0.6);
        vertical-align: middle;
      }
    </style>
  </head>
  <body>
    <div class="dialog">
      <img id="icon" class="icon" alt="ArcNext" />
      <div class="title">Are you sure you want to quit?</div>
      <div class="detail">All terminal sessions will be closed.</div>
      <div class="buttons">
        <button id="cancel" type="button">Cancel<span class="kbd">ESC</span></button>
        <button id="quit" type="button">Quit<span class="kbd">⏎</span></button>
      </div>
    </div>
    <script type="module" src="./quitDialog.ts"></script>
  </body>
</html>
